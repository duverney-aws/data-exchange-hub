[pytest]
# Pytest configuration for Pharma Data Exchange Hub

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests tests/integration

# Output options
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# Markers for categorizing tests
markers =
    property: Property-based tests using Hypothesis
    unit: Unit tests for specific functionality
    integration: Integration tests requiring AWS resources (profile hub-387776852668)
    slow: Tests that take a long time to run

# Hypothesis settings
hypothesis_profile = default

# Environment variables for integration tests
# Set AWS_PROFILE=hub-387776852668 before running integration tests:
#   AWS_PROFILE=hub-387776852668 pytest -m integration
